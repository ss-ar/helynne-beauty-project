<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Collections - Beauty by Helynne</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header class="hero hero-products">
        <div class="navbar"> 
            <h2 class="logo">Beauty by Helynne</h2>
            <div class="menu">
                 <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="services.html">SERVICE</a></li>
                    <li><a href="products.html">PRODUCTS</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                 </ul>
            </div>
            <div class="search">
                <input class="srch" type="search" placeholder="Search products...">
                <button class="btn-search">Search</button>
            </div>
        </div>

        <div class="hero-title">
            <h1>Our Collections</h1>
        </div>
    </header>

    <div class="background">
        <div class="window">
            <div class="window-header">
                <div class="dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
            </div>

            <div class="products-content">
                <h1>Product Collections</h1>

                <div class="products-grid">

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/laura-chouette-4sKdeIMiFEI-unsplash.jpg" alt="perfume">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">USH 50.000</p>
                    </div>

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/diego-castaneda-t-dPNgQlHPo-unsplash.jpg" alt="perfume">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">ush 50,000</p>
                    </div>

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/karly-jones-xBqYLnRhfaI-unsplash.jpg" alt="lotion">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">USH 30,000</p>
                    </div>

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/kadarius-seegars-uGD6cbk7Cz4-unsplash.jpg" alt="lotion">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">USH 45,000</p>
                    </div>

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/jackie-tsang-3_YP8_mh-Kg-unsplash.jpg" alt="jewelry">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">USH 30,000</p>
                    </div>

                    <div class="product-item">
                        <div class="image-box">
                            <img src="images/tina-park-4_1qfH3ds4M-unsplash.jpg" alt="jewelry">
                        </div>
                        <button class="view-btn">VIEW</button>
                        <p class="price">USH15,000</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
