<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT US - Beauty by Helynne</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="hero">
        <div class="navbar"> 
            <h2 class="logo">Beauty by Helynne</h2>
            <div class="menu">
                 <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="services.html">SERVICE</a></li>
                    <li><a href="products.html">PRODUCTS</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                 </ul>
            </div>
            <div class="search">
                <input class="srch" type="search" placeholder="Search...">
                <button class="btn-search">search</button> 
            </div>
        </div>
        <div class="hero-title">
            <h1>Contact Us</h1>
            <div class="icon">
                <a href="#"><ion-icon name="logo-facebook"></ion-icon></a>
                <a href="#"><ion-icon name="logo-instagram"></ion-icon></a>
                <a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
                <a href="#"><ion-icon name="logo-google"></ion-icon></a>
                <a href="#"><ion-icon name="logo-skype"></ion-icon></a>
            </div>
        </div>
    </header>

    <section class="contact-section">
        <div class="contact-container">
            <p class="subtitle">Any question or remarks? Just write us a message!</p>

            <form class="contact-form">
                <div class="input-group">
                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" placeholder="enter a valid email address" required>
                    </div>
                    <div class="input-box">
                        <label>Name</label>
                        <input type="text" placeholder="enter your name" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">SUBMIT MESSAGE</button>
            </form>
        </div>

        <div class="info-section">
            <div class="info-box">
                <div class="icon-circle"><i class="fa-solid fa-person-running"></i></div>
                <h3>ABOUT US</h3>
                <p>Beauty Experts<br>Style Guides</p>
            </div>
            <div class="info-box">
                <div class="icon-circle"><i class="fa-solid fa-phone"></i></div>
                <h3>PHONE</h3>
                <p>+256 7754634467<br>+256 7744772230</p>
            </div>
            <div class="info-box">
                <div class="icon-circle"><i class="fa-solid fa-location-arrow"></i></div>
                <h3>LOCATION</h3>
                <p>Zziwa Road, Kampala</p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
</body>
</html>
